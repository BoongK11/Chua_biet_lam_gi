<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            margin: 0 auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ff5722;      /* Đổi màu cam tại đây nếu muốn */
            text-align: center;  /* Căn giữa dòng chữ */
        }
        .btn {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Chào Mừng Đã Đến!!!</h1>
        
        <p style="text-align: center;">Trang Vip Pro Boong đã tạo.</p>
        
        <a href="#" class="btn">Bấm vào đây</a>
    </div>

    <script>
        // Bạn có thể viết code JavaScript ở đây nếu cần
        console.log("Trang web đã tải thành công!");
    </script>
</body>
