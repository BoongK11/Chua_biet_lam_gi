<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <!-- Tạo logo icon hình tròn chữ 9A phát sáng cho tab trình duyệt -->

    <!-- Tích hợp mạng P2P PeerJS để kết nối 2 thiết bị không cần server backend -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #0b0c10;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: 110% 110%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-position 0.1s ease-out;
            overflow-x: hidden;
        }
        /* Hiệu ứng khung kính Glassmorphism */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            margin: 0 auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            position: relative;
            z-index: 5;
        }
        /* Hiệu ứng chữ Chao Mung đổi màu Galaxy liên tục */
        h1 {
            background: linear-gradient(45deg, #ff5722, #ff007f, #7000ff, #00c6ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: galaxyAnimation 6s ease infinite;
            font-size: 65px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
        }
        @keyframes galaxyAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Dòng chữ lớp học phát sáng Neon xanh rực rỡ */
        .lop-hoc {
            color: #00ffcc;
            font-size: 38px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 25px 0;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0011ff;
            animation: pulse 2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        /* Chữ phụ màu trắng phát sáng nhẹ */
        p {
            color: #ffffff;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }
        /* Nút bấm Neon huyền ảo */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff5722, #ff007f);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8);
        }
        /* CSS CHO KHUNG POPUP HIỆN LÊN */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .popup-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            overflow-y: auto;
        }
        /* CSS CHO MENU LỰA CHỌN (MUSIC & MINI GAME) */
        .menu-container {
            display: flex;
            gap: 20px;
            padding: 60px 40px 40px 40px;
            justify-content: center;
            max-width: 480px;
            margin: 0 auto;
        }
        .menu-box {
            flex: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            user-select: none;
        }
        .menu-box:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6);
        }
        .menu-icon {
            font-size: 45px;
            margin-bottom: 10px;
        }
        .menu-box .menu-text {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        /* CSS NÚT QUAY LẠI GÓC TRÊN KHUNG CHỨA */
        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            position: absolute;
            top: 15px;
            left: 20px;
            transition: all 0.2s;
            z-index: 11;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        /* CSS CHO KHUNG LƯỚI CHỨA CÁC Ô SỐ */
        .number-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 60px 30px 25px 30px;
            max-width: 450px;
            margin: 0 auto;
        }
        /* CSS CHO TỪNG Ô SỐ NEON */
        .number-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #00ffcc, #0011ff);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }
        .number-box:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 0 20px #00ffcc, 0 0 30px #0011ff;
            background: linear-gradient(45deg, #ff007f, #ff5722);
        }
        .number-box.active {
            background: linear-gradient(45deg, #ff007f, #ff5722);
            box-shadow: 0 0 20px #ff007f;
        }
        .close-btn {
            position: absolute;
            top: 5px;
            right: 15px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .close-btn:hover {
            color: #ff007f;
        }
        @keyframes fadeInMusic {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* CSS CHO PHẦN SPOTIFY PLAYER */
        #spotifyWrapper {
            padding: 20px 30px 30px 30px;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
            animation: fadeInMusic 0.3s ease-out;
        }
        #spotifyPlayer {
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            width: 100%;
            height: 352px;
        }
        @media (max-width: 480px) {
            .menu-container { flex-direction: column; gap: 15px; padding: 60px 30px 30px 30px; }
            .menu-box { padding: 20px; }
            .number-container { grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 60px 20px 20px 20px; }
            .number-box { width: 55px; height: 55px; font-size: 22px; }
            h1 { font-size: 45px; }
            .lop-hoc { font-size: 24px; }
            p { font-size: 20px; }
            #spotifyPlayer { height: 280px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chao Mung Da Den!!!</h1>

    <!-- KHUNG POPUP TỔNG -->

                    <div style="color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 8px;">Luật chuẩn: Chạm quân của bạn, các ô đi hợp lệ sẽ sáng viền để bạn di chuyển!</div>

    <script>
        // HÀM TỰ ĐỘNG TẠO HIỆU ỨNG SAO BĂNG
        function initShootingStars() {
            const starContainer = document.createElement('div');
            starContainer.style.position = 'fixed';
            starContainer.style.top = '0';
            starContainer.style.left = '0';
            starContainer.style.width = '100%';
            starContainer.style.height = '100%';
            starContainer.style.zIndex = '1';
            starContainer.style.pointerEvents = 'none';
            starContainer.style.overflow = 'hidden';
            document.body.appendChild(starContainer);

            const style = document.createElement('style');
            style.innerHTML = `
                .sao-bang {
                    position: absolute;
                    background: linear-gradient(-45deg, #00f0ff, rgba(0, 0, 0, 0));
                    border-radius: 999px;
                    animation: bay-xuong linear forwards;
                    opacity: 0;
                }
                @keyframes bay-xuong {
                    0% { transform: translate(0, 0) rotate(-45deg); opacity: 0; width: 0; }
                    8% { opacity: 1; width: var(--w); }
                    85% { opacity: 1; }
                    100% { transform: translate(-1800px, 1800px) rotate(-45deg); opacity: 0; width: 0; }
                }
            `;
            document.head.appendChild(style);

            function spawnSingleStar() {
                const star = document.createElement('div');
                star.classList.add('sao-bang');
                const startX = 40 + Math.random() * 80; 
                const startY = -20 - Math.random() * 20; 
                star.style.left = `${startX}%`;
                star.style.top = `${startY}%`;
                const duration = 1.5 + Math.random() * 1.5; 
                star.style.animationDuration = `${duration}s`;
                const length = 300 + Math.random() * 200; 
                star.style.setProperty('--w', `${length}px`);
                const thickness = 2 + Math.random() * 1.5; 
                star.style.height = `${thickness}px`;
                const blueNeon = '#00f0ff';
                star.style.background = `linear-gradient(-45deg, ${blueNeon}, rgba(0, 0, 0, 0))`;
                star.style.filter = `drop-shadow(0 0 10px ${blueNeon}) drop-shadow(0 0 20px #0077ff)`;

                star.addEventListener('animationend', () => { star.remove(); });
                starContainer.appendChild(star);
            }

            function triggerWave() {
                const soLuongSao = 20;
                const chuKyGiay = 180; 
                for (let i = 0; i < soLuongSao; i++) {
                    const randomDelayMs = Math.random() * (chuKyGiay - 5) * 1000;
                    setTimeout(spawnSingleStar, randomDelayMs);
                }
            }
            triggerWave();
            setInterval(triggerWave, 180000);
        }
        initShootingStars();

        // HIỆU ỨNG ÂM THANH SYNTH
        let audioCtx = null;
        function playSynthSound(frequency, type = 'sine', duration = 0.15) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (error) {
                console.log("Trình duyệt chặn âm thanh: ", error);
            }
        }

        // NỀN DI CHUYỂN THEO CHUỘT
        document.addEventListener('mousemove', (e) => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mouseX = e.clientX - (width / 2);
            const mouseY = e.clientY - (height / 2);
            const moveX = (mouseX / width) * 30;
            const moveY = (mouseY / height) * 30;
            document.body.style.backgroundPosition = `calc(50% + ${moveX}px) calc(50% + ${moveY}px)`;
        });

        // ĐỊNH NGHĨA CÁC BIẾN UI
        const popup = document.getElementById('imagePopup');
        const openBtn = document.getElementById('openPopupBtn');
        const closeBtn = document.getElementById('closePopupBtn');
        const menuContainer = document.getElementById('menuContainer');
        const musicSection = document.getElementById('musicSection');
        const gameSection = document.getElementById('gameSection');
        const chooseMusicBtn = document.getElementById('chooseMusicBtn');
        const chooseGameBtn = document.getElementById('chooseGameBtn');
        const backFromMusic = document.getElementById('backFromMusic');
        const backFromGame = document.getElementById('backFromGame');
        const spotifyWrapper = document.getElementById('spotifyWrapper');
        const spotifyPlayer = document.getElementById('spotifyPlayer');

        const classPlaylist = {
            "1": "https://open.spotify.com/embed/track/331pu1rdL2Yn7Z3F1RNXBR?utm_source=generator&si=6a1bdae1c36546a6&time=181",
            "2": "https://open.spotify.com/embed/track/07SQzveMFNsEBl8eKLbVIG?utm_source=generator&si=39d7229af6bb4821",
            "3": "https://open.spotify.com/embed/track/7ouMYWpwJ422jRcDASZB7P",
            "4": "https://open.spotify.com/embed/track/4PTG3Z6ehGkBF2zI7YkR5C",
            "5": "https://open.spotify.com/embed/track/60S2vJv3nZ5j6Sg8N2z3sl",
            "6": "https://open.spotify.com/embed/track/1xsYJ8XGjGB1zl18zT4JAz",
            "7": "https://open.spotify.com/embed/track/5QO79kh1nOghj2pI0X4n6C",
            "8": "https://open.spotify.com/embed/track/0VjIjW4GlUZAMYd2v2ZcTI",
            "9": "https://open.spotify.com/embed/track/2t8yEwVjZjyq754fhJjAGn",
            "10": "https://open.spotify.com/embed/track/4iJyoZe61jG55T954j75Jg"
        };

        function resetPopupToMenu() {
            menuContainer.style.display = 'flex';
            musicSection.style.display = 'none';
            gameSection.style.display = 'none';
            spotifyWrapper.style.display = 'none';
            spotifyPlayer.src = "";
            document.querySelectorAll('.number-box').forEach(b => b.classList.remove('active'));
            leaveChessRoom();
        }

        openBtn.addEventListener('click', () => {
            playSynthSound(250, 'triangle', 0.12);
            resetPopupToMenu();
            popup.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            playSynthSound(180, 'sine', 0.1);
            popup.style.display = 'none';
        });

        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                playSynthSound(180, 'sine', 0.1);
                popup.style.display = 'none';
            }
        });

        chooseMusicBtn.addEventListener('click', () => {
            playSynthSound(350, 'triangle', 0.1);
            menuContainer.style.display = 'none';
            musicSection.style.display = 'block';
        });

        chooseGameBtn.addEventListener('click', () => {
            playSynthSound(350, 'triangle', 0.1);
            menuContainer.style.display = 'none';
            gameSection.style.display = 'block';
        });

        backFromMusic.addEventListener('click', () => {
            playSynthSound(200, 'sine', 0.1);
            resetPopupToMenu();
        });

        backFromGame.addEventListener('click', () => {
            playSynthSound(200, 'sine', 0.1);
            resetPopupToMenu();
        });

        const numberBoxes = document.querySelectorAll('.number-box');
        numberBoxes.forEach(box => {
            box.addEventListener('click', () => {
                const selectedNumber = box.innerText.trim();
                playSynthSound(520, 'triangle', 0.15);

                if(box.classList.contains('active')) {
                    box.classList.remove('active');
                    spotifyWrapper.style.display = 'none';
                    spotifyPlayer.src = "";
                } else {
                    numberBoxes.forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                    if(classPlaylist[selectedNumber]) {
                        // Đợi một chút trước khi gán src để đảm bảo iframe sẵn sàng
                        setTimeout(() => {
                            spotifyPlayer.src = classPlaylist[selectedNumber];
                        }, 100);
                        spotifyWrapper.style.display = 'block';
                    } else {
                        spotifyWrapper.style.display = 'none';
                        spotifyPlayer.src = "";
                    }
                }
            });
        });

        // ==========================================
        // KHU VỰC THUẬT TOÁN LUẬT CỜ VUA CHUẨN QUỐC TẾ
        // ==========================================
        let peer = null;
        let conn = null;
        let myRole = '';       
        let currentTurn = 'W';  
        let boardState = [];    
        let selectedSquare = null; 

        const pieceSymbols = { 'K': '♚', 'Q': '♛', 'R': '♜', 'B': '♝', 'N': '♞', 'P': '♟' };
        const initialRowPieces = ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R'];

        function initChessBoardData() {
            boardState = [];
            for (let r = 0; r < 8; r++) {
                let row = [];
                for (let c = 0; c < 8; c++) {
                    if (r === 0) row.push({ type: initialRowPieces[c], color: 'B', hasMoved: false });
                    else if (r === 1) row.push({ type: 'P', color: 'B', hasMoved: false });
                    else if (r === 6) row.push({ type: 'P', color: 'W', hasMoved: false });
                    else if (r === 7) row.push({ type: initialRowPieces[c], color: 'W', hasMoved: false });
                    else row.push(null);
                }
                boardState.push(row);
            }
        }

        // HÀM KIỂM TRA ĐƯỜNG ĐI TRỐNG (Dành cho Xe, Tượng, Hậu)
        function isPathClear(fromR, fromC, toR, toC) {
            const deltaR = Math.sign(toR - fromR);
            const deltaC = Math.sign(toC - fromC);
            let currR = fromR + deltaR;
            let currC = fromC + deltaC;

            while (currR !== toR || currC !== toC) {
                if (boardState[currR][currC] !== null) {
                    return false; // Bị vướng quân cờ trên đường đi
                }
                currR += deltaR;
                currC += deltaC;
            }
            return true;
        }

        // THUẬT TOÁN KIỂM TRA NƯỚC ĐI HỢP LỆ THEO TỪNG QUÂN
        function isValidMove(fromR, fromC, toR, toC) {
            const piece = boardState[fromR][fromC];
            const target = boardState[toR][toC];

            // 1. Không thể đi vào ô có quân cùng màu
            if (target && target.color === piece.color) return false;

            const diffR = Math.abs(toR - fromR);
            const diffC = Math.abs(toC - fromC);

            switch (piece.type) {
                case 'K': // VUA: Đi 1 ô duy nhất về mọi hướng
                    return diffR <= 1 && diffC <= 1;

                case 'Q': // HẬU: Kết hợp Xe + Tượng không giới hạn ô
                    if ((fromR === toR || fromC === toC) || (diffR === diffC)) {
                        return isPathClear(fromR, fromC, toR, toC);
                    }
                    return false;

                case 'R': // XE: Đi thẳng dọc/ngang không giới hạn ô
                    if (fromR === toR || fromC === toC) {
                        return isPathClear(fromR, fromC, toR, toC);
                    }
                    return false;

                case 'B': // TƯỢNG: Đi chéo không giới hạn ô
                    if (diffR === diffC) {
                        return isPathClear(fromR, fromC, toR, toC);
                    }
                    return false;

                case 'N': // MÃ: Hình chữ L (2-1 hoặc 1-2) và được phép nhảy qua đầu quân khác
                    return (diffR === 2 && diffC === 1) || (diffR === 1 && diffC === 2);

                case 'P': // TỐT: Đi thẳng 1 ô (nước đầu đi 2), ăn chéo 1 ô trước
                    const direction = piece.color === 'W' ? -1 : 1; // Quân trắng đi lên (-R), quân đen đi xuống (+R)
                    
                    // Đi thẳng 1 ô
                    if (fromC === toC && toR === fromR + direction && !target) {
                        return true;
                    }
                    // Đi thẳng 2 ô ở nước đi đầu tiên
                    if (fromC === toC && !piece.hasMoved && toR === fromR + 2 * direction) {
                        // Kiểm tra không có quân cờ nào cản ở cả ô giữa và ô đích
                        if (!boardState[fromR + direction][fromC] && !target) {
                            return true;
                        }
                    }
                    // Ăn chéo 1 ô
                    if (diffC === 1 && toR === fromR + direction && target && target.color !== piece.color) {
                        return true;
                    }
                    return false;
            }
            return false;
        }

        // TÌM TẤT CẢ CÁC Ô ĐI HỢP LỆ CỦA QUÂN CỜ ĐANG CHỌN ĐỂ HIỂN THỊ HƯỚNG DẪN
        function getValidMovesForPiece(r, c) {
            let validMoves = [];
            for (let targetR = 0; targetR < 8; targetR++) {
                for (let targetC = 0; targetC < 8; targetC++) {
                    if (isValidMove(r, c, targetR, targetC)) {
                        validMoves.push({ r: targetR, c: targetC });
                    }
                }
            }
            return validMoves;
        }

        function renderChessBoard() {
            const boardEl = document.getElementById('chessBoard');
            boardEl.innerHTML = '';

            // Lấy danh sách các ô gợi ý hợp lệ nếu có quân đang được chọn
            let highlightedSquares = [];
            if (selectedSquare) {
                highlightedSquares = getValidMovesForPiece(selectedSquare.r, selectedSquare.c);
            }

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.style.display = 'flex';
                    square.style.justifyContent = 'center';
                    square.style.alignItems = 'center';
                    square.style.fontSize = '28px';
                    square.style.cursor = 'pointer';
                    square.style.userSelect = 'none';
                    square.style.aspectRatio = '1';

                    const isDarkCell = (r + c) % 2 === 1;
                    square.style.backgroundColor = isDarkCell ? 'rgba(0, 0, 0, 0.4)' : 'rgba(255, 255, 255, 0.07)';

                    // Đổ màu viền hồng cho ô đang chọn
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
                        square.style.boxShadow = 'inset 0 0 12px #ff007f';
                    }

                    // Đổ màu viền xanh neon gợi ý cho các ô di chuyển hợp lệ
                    const isHint = highlightedSquares.some(m => m.r === r && m.c === c);
                    if (isHint) {
                        square.style.boxShadow = 'inset 0 0 10px #00ffcc';
                    }

                    const piece = boardState[r][c];
                    if (piece) {
                        square.innerText = pieceSymbols[piece.type];
                        if (piece.color === 'W') {
                            square.style.color = '#00ffcc'; 
                            square.style.textShadow = '0 0 8px #00ffcc';
                        } else {
                            square.style.color = '#ff007f'; 
                            square.style.textShadow = '0 0 8px #ff007f';
                        }
                    }

                    square.addEventListener('click', () => handleSquareClick(r, c, isHint));
                    boardEl.appendChild(square);
                }
            }

            const infoStatus = document.getElementById('gameInfoStatus');
            const roleText = myRole === 'W' ? 'Bên TRẮNG (Bạn)' : 'Bên ĐEN (Bạn)';
            const turnText = currentTurn === myRole ? 'LƯỢT CỦA BẠN' : 'ĐỐI THỦ ĐANG NGHĨ...';
            const turnColor = currentTurn === myRole ? '#00ffcc' : '#ff007f';
            infoStatus.innerHTML = `<span style="color:#fff">${roleText}</span> — <span style="color:${turnColor}; text-shadow: 0 0 5px ${turnColor};">${turnText}</span>`;
        }

        function handleSquareClick(r, c, isHint) {
            if (!conn) return; 
            if (currentTurn !== myRole) return; 

            const piece = boardState[r][c];

            if (selectedSquare) {
                // Nếu ấn lại đúng ô cũ thì hủy chọn
                if (selectedSquare.r === r && selectedSquare.c === c) {
                    selectedSquare = null;
                    renderChessBoard();
                    return;
                }

                // Thực hiện di chuyển nếu ô nhắm tới nằm trong danh sách gợi ý hợp lệ (isHint)
                if (isHint) {
                    const movingPiece = boardState[selectedSquare.r][selectedSquare.c];
                    
                    // Đánh dấu quân cờ này đã từng di chuyển (Phục vụ tính luật Tốt đi 2 ô nước đầu)
                    movingPiece.hasMoved = true;

                    // Tiến hành ăn quân/di chuyển dữ liệu
                    boardState[r][c] = movingPiece;
                    boardState[selectedSquare.r][selectedSquare.c] = null;

                    // Gửi trạng thái bàn cờ đồng bộ sang cho đối thủ P2P
                    conn.send({
                        type: 'MOVE',
                        board: boardState
                    });

                    selectedSquare = null;
                    currentTurn = myRole === 'W' ? 'B' : 'W'; 
                    playSynthSound(400, 'triangle', 0.1);
                    renderChessBoard();
                } else {
                    // Nếu ấn vào một ô không hợp lệ khác: 
                    // Thay vì di chuyển bừa, hệ thống sẽ kiểm tra xem ô đó có phải quân mình không để đổi lựa chọn quân cờ
                    if (piece && piece.color === myRole) {
                        selectedSquare = { r, c };
                        playSynthSound(580, 'sine', 0.08);
                        renderChessBoard();
                    } else {
                        // Ấn vào đất trống hoặc quân địch không hợp lệ thì hủy chọn quân cũ
                        selectedSquare = null;
                        renderChessBoard();
                    }
                }
            } else {
                // Nếu chưa chọn quân, tiến hành chọn quân cờ của phe mình
                if (piece && piece.color === myRole) {
                    selectedSquare = { r, c };
                    playSynthSound(580, 'sine', 0.08);
                    renderChessBoard();
                }
            }
        }

        function setupPeerEvents() {
            peer.on('error', (err) => {
                console.error(err);
                document.getElementById('waitingStatus').innerHTML = `<span style="color:#ff007f; font-size:14px;">Lỗi kết nối P2P (${err.type}). Hãy tắt Adblock hoặc F5 tải lại trang nhé!</span>`;
                setTimeout(resetChessUI, 4000);
            });

            peer.on('connection', (connection) => {
                if (conn) {
                    connection.close(); 
                    return;
                }
                conn = connection;
                myRole = 'W';
                currentTurn = 'W';
                initChessBoardData();
                setupConnectionDataChannel();

                document.getElementById('chessWaitingScreen').style.display = 'none';
                document.getElementById('chessGameArea').style.display = 'block';
                renderChessBoard();
                playSynthSound(600, 'triangle', 0.25);
            });
        }

        function setupConnectionDataChannel() {
            conn.on('data', (data) => {
                if (data.type === 'MOVE') {
                    boardState = data.board;
                    currentTurn = myRole; 
                    playSynthSound(480, 'triangle', 0.12);
                    renderChessBoard();
                }
            });

            conn.on('close', () => {
                alert("Đối thủ đã ngắt kết nối hoặc rời phòng cờ!");
                resetChessUI();
            });
        }

        function resetChessUI() {
            if (conn) { conn.close(); conn = null; }
            document.getElementById('chessConnectMenu').style.display = 'block';
            document.getElementById('chessWaitingScreen').style.display = 'none';
            document.getElementById('chessGameArea').style.display = 'none';
        }

        function leaveChessRoom() {
            resetChessUI();
            if (peer) { peer.destroy(); peer = null; }
        }

        // SỰ KIỆN NÚT TẠO PHÒNG
        document.getElementById('btnCreateRoom').addEventListener('click', () => {
            playSynthSound(300, 'triangle', 0.1);
            if (typeof Peer === 'undefined') {
                alert("Lỗi mạng: Trình duyệt không tải được thư viện PeerJS! Hãy tắt trình chặn quảng cáo rồi F5 chạy lại web nhé.");
                return;
            }

            document.getElementById('chessConnectMenu').style.display = 'none';
            document.getElementById('chessWaitingScreen').style.display = 'block';
            document.getElementById('waitingStatus').innerText = 'Đang đăng ký mã phòng với hệ thống vũ trụ...';

            const roomID = '9A-' + Math.floor(1000 + Math.random() * 9000);

            try {
                peer = new Peer(roomID);
                setupPeerEvents();
                
                const timeoutCheck = setTimeout(() => {
                    if (!peer || !peer.id) {
                        document.getElementById('waitingStatus').innerHTML = '<span style="color:#ff007f">Máy chủ mạng đang nghẽn. Bạn hãy ấn Quay lại rồi thử bấm Tạo phòng lại nhé!</span>';
                    }
                }, 10000);

                peer.on('open', (id) => {
                    clearTimeout(timeoutCheck);
                    document.getElementById('waitingStatus').innerText = 'Phòng đã tạo! Hãy gửi mã này cho bạn cùng chơi:';
                    document.getElementById('shareCodeArea').style.display = 'block';
                    document.getElementById('generatedRoomCode').innerText = id;
                });
            } catch (err) {
                document.getElementById('waitingStatus').innerText = 'Lỗi khởi tạo: ' + err.message;
            }
        });

        // SỰ KIỆN NÚT VÀO PHÒNG
        document.getElementById('btnJoinRoom').addEventListener('click', () => {
            const code = document.getElementById('roomCodeInput').value.trim();
            if (!code) {
                alert("Bạn ơi, hãy nhập mã phòng do bạn mình gửi trước nhé!");
                return;
            }
            if (typeof Peer === 'undefined') {
                alert("Lỗi mạng: Không tìm thấy thư viện kết nối cờ. Hãy kiểm tra lại mạng hoặc tắt Adblock nhé!");
                return;
            }

            playSynthSound(300, 'triangle', 0.1);
            document.getElementById('chessConnectMenu').style.display = 'none';
            document.getElementById('chessWaitingScreen').style.display = 'block';
            document.getElementById('waitingStatus').innerText = 'Đang định vị tọa độ phòng: ' + code + '...';
            document.getElementById('shareCodeArea').style.display = 'none';

            try {
                peer = new Peer(); 
                setupPeerEvents();
                
                peer.on('open', () => {
                    conn = peer.connect(code); 

                    const connTimeout = setTimeout(() => {
                        if (!conn || !conn.open) {
                            alert("Không thể kết nối! Vui lòng kiểm tra lại mã phòng hoặc bảo bạn mình giữ nguyên màn hình chờ nhé.");
                            resetChessUI();
                        }
                    }, 10000);

                    conn.on('open', () => {
                        clearTimeout(connTimeout);
                        myRole = 'B';
                        currentTurn = 'W'; 
                        initChessBoardData();
                        setupConnectionDataChannel();

                        document.getElementById('chessWaitingScreen').style.display = 'none';
                        document.getElementById('chessGameArea').style.display = 'block';
                        renderChessBoard();
                        playSynthSound(600, 'triangle', 0.25);
                    });
                });
            } catch (err) {
                alert("Lỗi kết nối: " + err.message);
                resetChessUI();
            }
        });

        console.log("Hệ thống Mini Game cờ vua luật quốc tế chuẩn chỉnh chống treo UI hoạt động ổn định!");
    </script>
</body>
