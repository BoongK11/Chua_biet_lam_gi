<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <!-- ĐÃ THÊM: Tạo logo icon hình tròn chữ 9A phát sáng cho tab trình duyệt -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23000%22 stroke=%22%2300ffcc%22 stroke-width=%225%22/><text y=%2250%22 x=%2250%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Segoe UI, Arial, sans-serif%22 font-weight=%22bold%22 font-size=%2250%22 fill=%22%2300ffcc%22 style=%22text-shadow: 0 0 10px %2300ffcc;%22>9A</text></svg>">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: 110% 110%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-position 0.1s ease-out;
        }

        /* Hiệu ứng khung kính Glassmorphism */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            margin: 0 auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        /* Hiệu ứng chữ Chao Mung đổi màu Galaxy liên tục */
        h1 {
            background: linear-gradient(45deg, #ff5722, #ff007f, #7000ff, #00c6ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: galaxyAnimation 6s ease infinite;
            font-size: 65px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
        }

        @keyframes galaxyAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dòng chữ lớp học phát sáng Neon xanh rực rỡ */
        .lop-hoc {
            color: #00ffcc;
            font-size: 38px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 25px 0;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0011ff;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Chữ phụ màu trắng phát sáng nhẹ */
        p {
            color: #ffffff;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        /* Nút bấm Neon huyền ảo */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff5722, #ff007f);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8);
        }

        /* CSS CHO KHUNG POPUP HIỆN LÊN */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .popup-content {
            position: relative;
            max-width: 90%;
            max-height: 85vh;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            overflow: hidden;
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 15px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .close-btn:hover {
            color: #ff007f;
        }

        /* CSS CHO KHUNG LƯỚI CHỨA CÁC Ô SỐ */
        .number-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 cột đều nhau */
            gap: 15px;
            padding: 50px 30px 30px 30px; /* Chừa khoảng trống bên trên cho nút đóng X */
            max-width: 450px;
            margin: 0 auto;
        }

        /* CSS CHO TỪNG Ô SỐ NEON */
        .number-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #00ffcc, #0011ff);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        /* Hiệu ứng khi rê chuột vào ô số */
        .number-box:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 0 20px #00ffcc, 0 0 30px #0011ff;
            background: linear-gradient(45deg, #ff007f, #ff5722);
        }

        /* Co giãn mượt mà trên điện thoại màn hình nhỏ */
        @media (max-width: 480px) {
            .number-container {
                grid-template-columns: repeat(3, 1fr); /* Đổi thành 3 cột nếu màn hình quá nhỏ */
                gap: 10px;
                padding: 45px 20px 20px 20px;
            }
            .number-box {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chao Mung Da Den!!!</h1>
        <div class="lop-hoc">AE Tồ Tề 9AB10 - K55 THCS Xuân Thu</div>
        <p>Đại Hội Võ Tuất</p>
        <a class="btn" id="openPopupBtn">Bấm vào đây</a>
    </div>

    <!-- KHUNG POPUP ĐÃ THAY ẢNH THÀNH 10 Ô SỐ -->
    <div class="popup-overlay" id="imagePopup">
        <div class="popup-content">
            <span class="close-btn" id="closePopupBtn">&times;</span>
            
            <div class="number-container">
                <div class="number-box">1</div>
                <div class="number-box">2</div>
                <div class="number-box">3</div>
                <div class="number-box">4</div>
                <div class="number-box">5</div>
                <div class="number-box">6</div>
                <div class="number-box">7</div>
                <div class="number-box">8</div>
                <div class="number-box">9</div>
                <div class="number-box">10</div>
            </div>
        </div>
    </div>

    <script>
        // XỬ LÝ NỀN DI CHUYỂN THEO CHUỘT
        document.addEventListener('mousemove', (e) => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mouseX = e.clientX - (width / 2);
            const mouseY = e.clientY - (height / 2);
            const moveX = (mouseX / width) * 30;
            const moveY = (mouseY / height) * 30;
            document.body.style.backgroundPosition = `calc(50% + ${moveX}px) calc(50% + ${moveY}px)`;
        });

        // XỬ LÝ ĐÓNG MỞ POPUP KHUNG SỐ
        const popup = document.getElementById('imagePopup');
        const openBtn = document.getElementById('openPopupBtn');
        const closeBtn = document.getElementById('closePopupBtn');

        openBtn.addEventListener('click', () => {
            popup.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            popup.style.display = 'none';
        });

        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                popup.style.display = 'none';
            }
        });

        console.log("Trang web vũ trụ tích hợp lưới số Neon đã sẵn sàng!");
    </script>
</body>
</html>
