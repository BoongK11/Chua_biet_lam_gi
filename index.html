<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <!-- Tạo logo icon hình tròn chữ 9A phát sáng cho tab trình duyệt -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23000%22 stroke=%22%2300ffcc%22 stroke-width=%225%22/><text y=%2250%22 x=%2250%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Segoe UI, Arial, sans-serif%22 font-weight=%22bold%22 font-size=%2250%22 fill=%22%2300ffcc%22 style=%22text-shadow: 0 0 10px %2300ffcc;%22>9A</text></svg>">
    <!-- Tích hợp mạng P2P PeerJS để kết nối 2 thiết bị không cần server backend -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #0b0c10; /* Màu nền dự phòng */
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: 110% 110%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-position 0.1s ease-out;
            overflow-x: hidden;
        }
        /* Hiệu ứng khung kính Glassmorphism */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            margin: 0 auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            position: relative;
            z-index: 5;
        }
        /* Hiệu ứng chữ Chao Mung đổi màu Galaxy liên tục */
        h1 {
            background: linear-gradient(45deg, #ff5722, #ff007f, #7000ff, #00c6ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: galaxyAnimation 6s ease infinite;
            font-size: 65px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
        }
        @keyframes galaxyAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Dòng chữ lớp học phát sáng Neon xanh rực rỡ */
        .lop-hoc {
            color: #00ffcc;
            font-size: 38px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 25px 0;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0011ff;
            animation: pulse 2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        /* Chữ phụ màu trắng phát sáng nhẹ */
        p {
            color: #ffffff;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }
        /* Nút bấm Neon huyền ảo */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff5722, #ff007f);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8);
        }
        /* CSS CHO KHUNG POPUP HIỆN LÊN */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .popup-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            overflow-y: auto;
        }
        /* CSS CHO MENU LỰA CHỌN (MUSIC & MINI GAME) */
        .menu-container {
            display: flex;
            gap: 20px;
            padding: 60px 40px 40px 40px;
            justify-content: center;
            max-width: 480px;
            margin: 0 auto;
        }
        .menu-box {
            flex: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            user-select: none;
        }
        .menu-box:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6);
        }
        .menu-icon {
            font-size: 45px;
            margin-bottom: 10px;
        }
        .menu-box .menu-text {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        /* CSS NÚT QUAY LẠI GÓC TRÊN KHUNG CHỨA */
        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            position: absolute;
            top: 15px;
            left: 20px;
            transition: all 0.2s;
            z-index: 11;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        /* CSS CHO KHUNG LƯỚI CHỨA CÁC Ô SỐ */
        .number-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 60px 30px 25px 30px;
            max-width: 450px;
            margin: 0 auto;
        }
        /* CSS CHO TỪNG Ô SỐ NEON */
        .number-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #00ffcc, #0011ff);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }
        .number-box:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 0 20px #00ffcc, 0 0 30px #0011ff;
            background: linear-gradient(45deg, #ff007f, #ff5722);
        }
        /* Trạng thái ô số được chọn active */
        .number-box.active {
            background: linear-gradient(45deg, #ff007f, #ff5722);
            box-shadow: 0 0 20px #ff007f;
        }
        .close-btn {
            position: absolute;
            top: 5px;
            right: 15px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .close-btn:hover {
            color: #ff007f;
        }
        @keyframes fadeInMusic {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            .menu-container { flex-direction: column; gap: 15px; padding: 60px 30px 30px 30px; }
            .menu-box { padding: 20px; }
            .number-container { grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 60px 20px 20px 20px; }
            .number-box { width: 55px; height: 55px; font-size: 22px; }
            h1 { font-size: 45px; }
            .lop-hoc { font-size: 24px; }
            p { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chao Mung Da Den!!!</h1>
        <div class="lop-hoc">AE Tồ Tề 9AB10 - K55 THCS Xuân Thu</div>
        <p>Đại Hội Võ Tuất</p>
        <a class="btn" id="openPopupBtn">Bấm vào đây</a>
    </div>

    <!-- KHUNG POPUP TỔNG -->
    <div class="popup-overlay" id="imagePopup">
        <div class="popup-content">
            <span class="close-btn" id="closePopupBtn">&times;</span>

            <!-- MENU LỰA CHỌN BAN ĐẦU -->
            <div id="menuContainer" class="menu-container">
                <div class="menu-box" id="chooseMusicBtn">
                    <div class="menu-icon">🎵</div>
                    <div class="menu-text">Music</div>
                </div>
                <div class="menu-box" id="chooseGameBtn">
                    <div class="menu-icon">🎮</div>
                    <div class="menu-text">Mini Game</div>
                </div>
            </div>

            <!-- PHẦN HIỂN THỊ MUSIC (TỐI ƯU DYNAMIC) -->
            <div id="musicSection" style="display: none; animation: fadeInMusic 0.3s ease-out;">
                <button class="back-btn" id="backFromMusic">⬅ Quay lại</button>
                <div class="number-container">
                    <div class="number-box">1</div>
                    <div class="number-box">2</div>
                    <div class="number-box">3</div>
                    <div class="number-box">4</div>
                    <div class="number-box">5</div>
                    <div class="number-box">6</div>
                    <div class="number-box">7</div>
                    <div class="number-box">8</div>
                    <div class="number-box">9</div>
                    <div class="number-box">10</div>
                </div>
                
                <!-- Một Khung Chứa Nhạc Duy Nhất Dùng Chung -->
                <div id="spotifyWrapper" style="display: none; padding: 0 30px 30px 30px; max-width: 450px; margin: 0 auto;">
                    <iframe id="spotifyPlayer" style="border-radius:12px" src="" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>

            <!-- PHẦN HIỂN THỊ MINI GAME: CỜ VUA 2 THIẾT BỊ P2P -->
            <div id="gameSection" style="display: none; padding: 60px 20px 30px 20px; text-align: center; max-width: 480px; margin: 0 auto; animation: fadeInMusic 0.3s ease-out;">
                <button class="back-btn" id="backFromGame">⬅ Quay lại</button>
                <h3 style="color: #ff007f; font-size: 26px; margin: 5px 0 15px 0; text-shadow: 0 0 10px #ff007f;">Cờ Vua Đối Kháng</h3>
                
                <!-- Giao diện kết nối ban đầu -->
                <div id="chessConnectMenu" style="margin-top: 15px;">
                    <button class="btn" id="btnCreateRoom" style="background: linear-gradient(45deg, #00ffcc, #0011ff); font-size: 15px; padding: 10px 15px; width: 85%; margin-bottom: 12px;">Tạo Phòng (Quân Trắng)</button>
                    <div style="color: rgba(255,255,255,0.6); font-size: 14px; margin: 5px 0;">- HOẶC -</div>
                    <input type="text" id="roomCodeInput" placeholder="Nhập mã phòng bạn cấp..." style="padding: 10px; width: 80%; border-radius: 8px; border: 1px solid #00ffcc; background: rgba(0,0,0,0.6); color: #fff; text-align: center; font-size: 15px; margin-bottom: 10px; outline: none;">
                    <button class="btn" id="btnJoinRoom" style="font-size: 15px; padding: 10px 15px; width: 85%;">Vào Phòng (Quân Đen)</button>
                </div>

                <!-- Giao diện trạng thái chờ -->
                <div id="chessWaitingScreen" style="display: none; margin-top: 15px; color: #fff;">
                    <p style="font-size: 16px; margin-bottom: 10px;" id="waitingStatus">Đang kết nối trạm vũ trụ...</p>
                    <div id="shareCodeArea" style="display: none; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed #00ffcc;">
                        <span style="color: #00ffcc; font-weight: bold; font-size: 24px; letter-spacing: 2px;" id="generatedRoomCode">-----</span>
                    </div>
                </div>

                <!-- Giao diện chiến trường Bàn Cờ -->
                <div id="chessGameArea" style="display: none; margin-top: 10px;">
                    <div id="gameInfoStatus" style="color: #fff; font-size: 16px; margin-bottom: 12px; font-weight: bold;">Chờ kết nối...</div>
                    <!-- Ma trận bàn cờ 8x8 phát sáng -->
                    <div id="chessBoard" style="display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; aspect-ratio: 1; border: 3px solid rgba(255,255,255,0.2); box-shadow: 0 0 20px rgba(0,255,204,0.2); border-radius: 8px; overflow: hidden; background-color: rgba(0,0,0,0.4);"></div>
                    <div style="color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 8px;">Mẹo: Chế độ tự do hành quân, chạm quân của mình rồi chạm ô đến để di chuyển!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // HÀM TỰ ĐỘNG TẠO HIỆU ỨNG SAO BĂNG DI CHUYỂN DYNAMIC
        function initShootingStars() {
            const starContainer = document.createElement('div');
            starContainer.style.position = 'fixed';
            starContainer.style.top = '0';
            starContainer.style.left = '0';
            starContainer.style.width = '100%';
            starContainer.style.height = '100%';
            starContainer.style.zIndex = '1';
            starContainer.style.pointerEvents = 'none';
            starContainer.style.overflow = 'hidden';
            document.body.appendChild(starContainer);

            const style = document.createElement('style');
            style.innerHTML = `
                .sao-bang {
                    position: absolute;
                    background: linear-gradient(-45deg, #00f0ff, rgba(0, 0, 0, 0));
                    border-radius: 999px;
                    animation: bay-xuong linear forwards;
                    opacity: 0;
                }
                @keyframes bay-xuong {
                    0% { transform: translate(0, 0) rotate(-45deg); opacity: 0; width: 0; }
                    8% { opacity: 1; width: var(--w); }
                    85% { opacity: 1; }
                    100% { transform: translate(-1800px, 1800px) rotate(-45deg); opacity: 0; width: 0; }
                }
            `;
            document.head.appendChild(style);

            function spawnSingleStar() {
                const star = document.createElement('div');
                star.classList.add('sao-bang');
                const startX = 40 + Math.random() * 80; 
                const startY = -20 - Math.random() * 20; 
                star.style.left = `${startX}%`;
                star.style.top = `${startY}%`;
                const duration = 1.5 + Math.random() * 1.5; 
                star.style.animationDuration = `${duration}s`;
                const length = 300 + Math.random() * 200; 
                star.style.setProperty('--w', `${length}px`);
                const thickness = 2 + Math.random() * 1.5; 
                star.style.height = `${thickness}px`;
                const blueNeon = '#00f0ff';
                star.style.background = `linear-gradient(-45deg, ${blueNeon}, rgba(0, 0, 0, 0))`;
                star.style.filter = `drop-shadow(0 0 10px ${blueNeon}) drop-shadow(0 0 20px #0077ff)`;

                star.addEventListener('animationend', () => {
                    star.remove();
                });
                starContainer.appendChild(star);
            }

            function triggerWave() {
                const soLuongSao = 20;
                const chuKyGiay = 180; 
                for (let i = 0; i < soLuongSao; i++) {
                    const randomDelayMs = Math.random() * (chuKyGiay - 5) * 1000;
                    setTimeout(spawnSingleStar, randomDelayMs);
                }
            }
            triggerWave();
            setInterval(triggerWave, 180000); // 180 giây chuẩn chill
        }
        initShootingStars();

        // HÀM TỰ TẠO ÂM THANH SỬ DỤNG WEB AUDIO API
        let audioCtx = null;
        function playSynthSound(frequency, type = 'sine', duration = 0.15) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (error) {
                console.log("Trình duyệt chặn âm thanh: ", error);
            }
        }

        // XỬ LÝ NỀN DI CHUYỂN THEO CHUỘT
        document.addEventListener('mousemove', (e) => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mouseX = e.clientX - (width / 2);
            const mouseY = e.clientY - (height / 2);
            const moveX = (mouseX / width) * 30;
            const moveY = (mouseY / height) * 30;
            document.body.style.backgroundPosition = `calc(50% + ${moveX}px) calc(50% + ${moveY}px)`;
        });

        // ĐỊNH NGHĨA CÁC PHẦN TỬ DOM GIAO DIỆN
        const popup = document.getElementById('imagePopup');
        const openBtn = document.getElementById('openPopupBtn');
        const closeBtn = document.getElementById('closePopupBtn');
        const menuContainer = document.getElementById('menuContainer');
        const musicSection = document.getElementById('musicSection');
        const gameSection = document.getElementById('gameSection');
        const chooseMusicBtn = document.getElementById('chooseMusicBtn');
        const chooseGameBtn = document.getElementById('chooseGameBtn');
        const backFromMusic = document.getElementById('backFromMusic');
        const backFromGame = document.getElementById('backFromGame');
        const spotifyWrapper = document.getElementById('spotifyWrapper');
        const spotifyPlayer = document.getElementById('spotifyPlayer');

        // DANH SÁCH BÀI HÁT PLAYLIST
        const classPlaylist = {
            "1": "https://open.spotify.com/embed/track/331pu1rdL2Yn7Z3F1RNXBR?utm_source=generator&si=6a1bdae1c36546a6&time=181",
            "2": "https://open.spotify.com/embed/track/07SQzveMFNsEBl8eKLbVIG?utm_source=generator&si=39d7229af6bb4821",
            "3": "https://open.spotify.com/embed/track/7ouMYWpwJ422jRcDASZB7P",
            "4": "https://open.spotify.com/embed/track/4PTG3Z6ehGkBF2zI7YkR5C",
            "5": "https://open.spotify.com/embed/track/60S2vJv3nZ5j6Sg8N2z3sl",
            "6": "https://open.spotify.com/embed/track/1xsYJ8XGjGB1zl18zT4JAz",
            "7": "https://open.spotify.com/embed/track/5QO79kh1nOghj2pI0X4n6C",
            "8": "https://open.spotify.com/embed/track/0VjIjW4GlUZAMYd2v2ZcTI",
            "9": "https://open.spotify.com/embed/track/2t8yEwVjZjyq754fhJjAGn",
            "10": "https://open.spotify.com/embed/track/4iJyoZe61jG55T954j75Jg"
        };

        // Hàm đặt Popup về trạng thái ban đầu
        function resetPopupToMenu() {
            menuContainer.style.display = 'flex';
            musicSection.style.display = 'none';
            gameSection.style.display = 'none';
            spotifyWrapper.style.display = 'none';
            spotifyPlayer.src = "";
            document.querySelectorAll('.number-box').forEach(b => b.classList.remove('active'));
            leaveChessRoom(); // Đóng kết nối cờ nếu đang mở
        }

        openBtn.addEventListener('click', () => {
            playSynthSound(250, 'triangle', 0.12);
            resetPopupToMenu();
            popup.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            playSynthSound(180, 'sine', 0.1);
            popup.style.display = 'none';
        });

        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                playSynthSound(180, 'sine', 0.1);
                popup.style.display = 'none';
            }
        });

        chooseMusicBtn.addEventListener('click', () => {
            playSynthSound(350, 'triangle', 0.1);
            menuContainer.style.display = 'none';
            musicSection.style.display = 'block';
        });

        chooseGameBtn.addEventListener('click', () => {
            playSynthSound(350, 'triangle', 0.1);
            menuContainer.style.display = 'none';
            gameSection.style.display = 'block';
        });

        backFromMusic.addEventListener('click', () => {
            playSynthSound(200, 'sine', 0.1);
            resetPopupToMenu();
        });

        backFromGame.addEventListener('click', () => {
            playSynthSound(200, 'sine', 0.1);
            resetPopupToMenu();
        });

        // XỬ LÝ CHỌN NHẠC DYNAMIC
        const numberBoxes = document.querySelectorAll('.number-box');
        numberBoxes.forEach(box => {
            box.addEventListener('click', () => {
                const selectedNumber = box.innerText.trim();
                playSynthSound(520, 'triangle', 0.15);

                if(box.classList.contains('active')) {
                    box.classList.remove('active');
                    spotifyWrapper.style.display = 'none';
                    spotifyPlayer.src = "";
                } else {
                    numberBoxes.forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                    if(classPlaylist[selectedNumber]) {
                        spotifyPlayer.src = classPlaylist[selectedNumber];
                        spotifyWrapper.style.display = 'block';
                    } else {
                        spotifyWrapper.style.display = 'none';
                        spotifyPlayer.src = "";
                        playSynthSound(300, 'sine', 0.1);
                    }
                }
            });
        });

        // ==========================================
        // KHU VỰC THUẬT TOÁN ENGINE CỜ VUA P2P ONLINE
        // ==========================================
        let peer = null;
        let conn = null;
        let myRole = '';       // 'W' hoặc 'B'
        let currentTurn = 'W';  // 'W' luôn đi trước
        let boardState = [];    // Ma trận lưu quân cờ
        let selectedSquare = null; // Lưu vị trí ô đang bấm chọn

        const pieceSymbols = { 'K': '♚', 'Q': '♛', 'R': '♜', 'B': '♝', 'N': '♞', 'P': '♟' };
        const initialRowPieces = ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R'];

        // Khởi tạo trạng thái quân cờ lúc đầu
        function initChessBoardData() {
            boardState = [];
            for (let r = 0; r < 8; r++) {
                let row = [];
                for (let c = 0; c < 8; c++) {
                    if (r === 0) row.push({ type: initialRowPieces[c], color: 'B' });
                    else if (r === 1) row.push({ type: 'P', color: 'B' });
                    else if (r === 6) row.push({ type: 'P', color: 'W' });
                    else if (r === 7) row.push({ type: initialRowPieces[c], color: 'W' });
                    else row.push(null);
                }
                boardState.push(row);
            }
        }

        // Vẽ bàn cờ lên giao diện HTML dạng Neon matrix
        function renderChessBoard() {
            const boardEl = document.getElementById('chessBoard');
            boardEl.innerHTML = '';

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.style.display = 'flex';
                    square.style.justifyContent = 'center';
                    square.style.alignItems = 'center';
                    square.style.fontSize = '28px';
                    square.style.cursor = 'pointer';
                    square.style.userSelect = 'none';
                    square.style.aspectRatio = '1';

                    // Tạo màu ô ca-rô phong cách nền tối
                    const isDarkCell = (r + c) % 2 === 1;
                    square.style.backgroundColor = isDarkCell ? 'rgba(0, 0, 0, 0.4)' : 'rgba(255, 255, 255, 0.07)';

                    // Tạo viền quét sáng nếu ô này đang được bấm chọn
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
                        square.style.boxShadow = 'inset 0 0 12px #ff007f';
                    }

                    const piece = boardState[r][c];
                    if (piece) {
                        square.innerText = pieceSymbols[piece.type];
                        // Phối màu Neon cực đỉnh tương phản
                        if (piece.color === 'W') {
                            square.style.color = '#00ffcc'; // Quân Trắng ánh Cyan
                            square.style.textShadow = '0 0 8px #00ffcc';
                        } else {
                            square.style.color = '#ff007f'; // Quân Đen ánh Hồng Neon
                            square.style.textShadow = '0 0 8px #ff007f';
                        }
                    }

                    square.addEventListener('click', () => handleSquareClick(r, c));
                    boardEl.appendChild(square);
                }
            }

            // Đồng bộ thanh trạng thái hiển thị lượt đi
            const infoStatus = document.getElementById('gameInfoStatus');
            const roleText = myRole === 'W' ? 'Bên TRẮNG (Bạn)' : 'Bên ĐEN (Bạn)';
            const turnText = currentTurn === myRole ? 'LƯỢT CỦA BẠN' : 'ĐỐI THỦ ĐANG NGHĨ...';
            const turnColor = currentTurn === myRole ? '#00ffcc' : '#ff007f';
            infoStatus.innerHTML = `<span style="color:#fff">${roleText}</span> — <span style="color:${turnColor}; text-shadow: 0 0 5px ${turnColor};">${turnText}</span>`;
        }

        // Xử lý khi người chơi bấm chọn ô trên bàn cờ
        function handleSquareClick(r, c) {
            if (!conn) return; 
            if (currentTurn !== myRole) return; // Không phải lượt của mình thì khóa bấm

            const piece = boardState[r][c];

            if (selectedSquare) {
                // Nếu bấm lại vào đúng ô cũ -> hủy chọn quân
                if (selectedSquare.r === r && selectedSquare.c === c) {
                    selectedSquare = null;
                    renderChessBoard();
                    return;
                }

                // Thực hiện di chuyển hành quân tự do (Sandbox mode)
                const movingPiece = boardState[selectedSquare.r][selectedSquare.c];
                boardState[r][c] = movingPiece;
                boardState[selectedSquare.r][selectedSquare.c] = null;

                // Đồng bộ dữ liệu bàn cờ vừa đi thẳng sang thiết bị đối thủ lập tức
                conn.send({
                    type: 'MOVE',
                    board: boardState
                });

                selectedSquare = null;
                currentTurn = myRole === 'W' ? 'B' : 'W'; // Đổi lượt đi
                playSynthSound(400, 'triangle', 0.1);
                renderChessBoard();
            } else {
                // Chọn quân cờ (chỉ được phép chọn quân thuộc màu phe mình)
                if (piece && piece.color === myRole) {
                    selectedSquare = { r, c };
                    playSynthSound(580, 'sine', 0.08);
                    renderChessBoard();
                }
            }
        }

        // Cài đặt lắng nghe các sự kiện nhận data từ mạng ngang hàng P2P
        function setupPeerEvents() {
            peer.on('error', (err) => {
                console.error(err);
                alert("Lỗi mạng vũ trụ P2P: " + err.type);
                resetChessUI();
            });

            // Chủ phòng đón người chơi thứ 2 vào phòng
            peer.on('connection', (connection) => {
                if (conn) {
                    connection.close(); // Phòng đầy
                    return;
                }
                conn = connection;
                myRole = 'W';
                currentTurn = 'W';
                initChessBoardData();
                setupConnectionDataChannel();

                document.getElementById('chessWaitingScreen').style.display = 'none';
                document.getElementById('chessGameArea').style.display = 'block';
                renderChessBoard();
                playSynthSound(600, 'triangle', 0.25);
            });
        }

        // Nhận gói dữ liệu di chuyển từ thiết bị đối thủ truyền sang
        function setupConnectionDataChannel() {
            conn.on('data', (data) => {
                if (data.type === 'MOVE') {
                    boardState = data.board;
                    currentTurn = myRole; // Trả lại lượt đi cho mình
                    playSynthSound(480, 'triangle', 0.12);
                    renderChessBoard();
                }
            });

            conn.on('close', () => {
                alert("Đối thủ đã ngắt kết nối hoặc rời phòng cờ!");
                resetChessUI();
            });
        }

        function resetChessUI() {
            if (conn) { conn.close(); conn = null; }
            document.getElementById('chessConnectMenu').style.display = 'block';
            document.getElementById('chessWaitingScreen').style.display = 'none';
            document.getElementById('chessGameArea').style.display = 'none';
        }

        function leaveChessRoom() {
            resetChessUI();
            if (peer) { peer.destroy(); peer = null; }
        }

        // CLICK: Nút Tạo phòng (Chủ phòng - Quân Trắng)
        document.getElementById('btnCreateRoom').addEventListener('click', () => {
            playSynthSound(300, 'triangle', 0.1);
            document.getElementById('chessConnectMenu').style.display = 'none';
            document.getElementById('chessWaitingScreen').style.display = 'block';
            document.getElementById('waitingStatus').innerText = 'Đang lấy mã phòng từ không gian...';

            // Tạo mã phòng ngẫu nhiên ngắn gọn dễ gửi qua Zalo/Mess
            const roomID = '9A-' + Math.floor(1000 + Math.random() * 9000);

            peer = new Peer(roomID);
            peer.on('open', (id) => {
                document.getElementById('waitingStatus').innerText = 'Phòng đã tạo! Hãy gửi mã này cho bạn cùng chơi:';
                document.getElementById('shareCodeArea').style.display = 'block';
                document.getElementById('generatedRoomCode').innerText = id;
                setupPeerEvents();
            });
        });

        // CLICK: Nút Vào phòng (Khách vào - Quân Đen)
        document.getElementById('btnJoinRoom').addEventListener('click', () => {
            const code = document.getElementById('roomCodeInput').value.trim();
            if (!code) {
                alert("Bạn ơi, hãy nhập mã phòng do bạn mình gửi trước nhé!");
                return;
            }
            playSynthSound(300, 'triangle', 0.1);
            document.getElementById('chessConnectMenu').style.display = 'none';
            document.getElementById('chessWaitingScreen').style.display = 'block';
            document.getElementById('waitingStatus').innerText = 'Đang dò sóng tìm phòng: ' + code + '...';
            document.getElementById('shareCodeArea').style.display = 'none';

            peer = new Peer(); // Tạo ID ngẫu nhiên cho client kết nối
            peer.on('open', () => {
                setupPeerEvents();
                conn = peer.connect(code); // Gọi lệnh bắt tay kết nối P2P

                conn.on('open', () => {
                    myRole = 'B';
                    currentTurn = 'W'; // Quân Trắng đi trước
                    initChessBoardData();
                    setupConnectionDataChannel();

                    document.getElementById('chessWaitingScreen').style.display = 'none';
                    document.getElementById('chessGameArea').style.display = 'block';
                    renderChessBoard();
                    playSynthSound(600, 'triangle', 0.25);
                });
            });
        });

        console.log("Hệ thống Chu kỳ Mưa sao băng 180s lãng mạn & Cờ Vua P2P đa thiết bị đã sẵn sàng!");
    </script>
</body>
</html>
