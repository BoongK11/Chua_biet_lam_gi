<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <!-- Tạo logo icon hình tròn chữ 9A phát sáng cho tab trình duyệt -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23000%22 stroke=%22%2300ffcc%22 stroke-width=%222%22/><text x=%2250%22 y=%2265%22 font-size=%2250%22 font-weight=%22bold%22 fill=%22%2300ffcc%22 text-anchor=%22middle%22 font-family=%22Arial%22>9A</text></svg>">
    <!-- Tích hợp mạng P2P PeerJS để kết nối 2 thiết bị không cần server backend -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #0b0c10;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: 110% 110%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-position 0.1s ease-out;
            overflow-x: hidden;
        }
        /* Hiệu ứng khung kính Glassmorphism */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            margin: 0 auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            position: relative;
            z-index: 5;
        }
        /* Hiệu ứng chữ Chao Mung đổi màu Galaxy liên tục */
        h1 {
            background: linear-gradient(45deg, #ff5722, #ff007f, #7000ff, #00c6ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: galaxyAnimation 6s ease infinite;
            font-size: 65px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
        }
        @keyframes galaxyAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Dòng chữ lớp học phát sáng Neon xanh rực rỡ */
        .lop-hoc {
            color: #00ffcc;
            font-size: 38px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 25px 0;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0011ff;
            animation: pulse 2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        /* Chữ phụ màu trắng phát sáng nhẹ */
        p {
            color: #ffffff;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }
        /* Nút bấm Neon huyền ảo */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff5722, #ff007f);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8);
        }
        /* CSS CHO KHUNG POPUP HIỆN LÊN */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .popup-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            overflow-y: auto;
        }
        /* CSS NÚT QUAY LẠI GÓC TRÊN KHUNG CHỨA */
        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            position: absolute;
            top: 15px;
            left: 20px;
            transition: all 0.2s;
            z-index: 11;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .close-btn {
            position: absolute;
            top: 5px;
            right: 15px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .close-btn:hover {
            color: #ff007f;
        }
        @keyframes fadeInGame {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            h1 { font-size: 45px; }
            .lop-hoc { font-size: 24px; }
            p { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chao Mung Da Den!!!</h1>
        <div class="lop-hoc">AE Tồ Tề 9AB10 - K55 THCS Xuân Thu</div>
        <p>Đại Hội Võ Tuất</p>
        <a class="btn" id="openPopupBtn">Bấm vào đây</a>
    </div>

    <!-- KHUNG POPUP TỔNG -->
    <div class="popup-overlay" id="imagePopup">
        <div class="popup-content">
            <span class="close-btn" id="closePopupBtn">&times;</span>

            <!-- PHẦN HIỂN THỊ MINI GAME: CỜ VUA LUẬT CHUẨN P2P -->
            <div id="gameSection" style="padding: 60px 20px 30px 20px; text-align: center; max-width: 480px; margin: 0 auto; animation: fadeInGame 0.3s ease-out;">
                <h3 style="color: #ff007f; font-size: 26px; margin: 5px 0 15px 0; text-shadow: 0 0 10px #ff007f;">Cờ Vua Đối Kháng</h3>
                
                <div id="chessConnectMenu" style="margin-top: 15px;">
                    <button class="btn" id="btnCreateRoom" style="background: linear-gradient(45deg, #00ffcc, #0011ff); font-size: 15px; padding: 10px 15px; width: 85%; margin-bottom: 12px;">Tạo Phòng (Quân Trắng)</button>
                    <div style="color: rgba(255,255,255,0.6); font-size: 14px; margin: 5px 0;">- HOẶC -</div>
                    <input type="text" id="roomCodeInput" placeholder="Nhập mã phòng bạn cấp..." style="padding: 10px; width: 80%; border-radius: 8px; border: 1px solid #00ffcc; background: rgba(0,255,204,0.05); color: #fff; font-size: 14px;">
                    <button class="btn" id="btnJoinRoom" style="font-size: 15px; padding: 10px 15px; width: 85%; margin-top: 12px;">Vào Phòng (Quân Đen)</button>
                </div>

                <div id="chessWaitingScreen" style="display: none; margin-top: 15px; color: #fff;">
                    <p style="font-size: 16px; margin-bottom: 10px;" id="waitingStatus">Đang kết nối trạm vũ trụ...</p>
                    <div id="shareCodeArea" style="display: none; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed #00ffcc;">
                        <span style="color: #00ffcc; font-weight: bold; font-size: 24px; letter-spacing: 2px;" id="generatedRoomCode">-----</span>
                    </div>
                </div>

                <div id="chessGameArea" style="display: none; margin-top: 10px;">
                    <div id="gameInfoStatus" style="color: #fff; font-size: 16px; margin-bottom: 12px; font-weight: bold;">Chờ kết nối...</div>
                    <div id="chessBoard" style="display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; aspect-ratio: 1; border: 3px solid rgba(255,255,255,0.15); border-radius: 8px; background: #0a0a0a; box-shadow: 0 0 20px rgba(0,255,204,0.2);"></div>
                    <div style="color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 8px;">Luật chuẩn: Chạm quân của bạn, các ô đi hợp lệ sẽ sáng viền để bạn di chuyển!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // HÀM TỰ ĐỘNG TẠO HIỆU ỨNG SAO BĂNG
        function initShootingStars() {
            const starContainer = document.createElement('div');
            starContainer.style.position = 'fixed';
            starContainer.style.top = '0';
            starContainer.style.left = '0';
            starContainer.style.width = '100%';
            starContainer.style.height = '100%';
            starContainer.style.zIndex = '1';
            starContainer.style.pointerEvents = 'none';
            starContainer.style.overflow = 'hidden';
            document.body.appendChild(starContainer);

            const style = document.createElement('style');
            style.innerHTML = `
                .sao-bang {
                    position: absolute;
                    background: linear-gradient(-45deg, #00f0ff, rgba(0, 0, 0, 0));
                    border-radius: 999px;
                    animation: bay-xuong linear forwards;
                    opacity: 0;
                }
                @keyframes bay-xuong {
                    0% { transform: translate(0, 0) rotate(-45deg); opacity: 0; width: 0; }
                    8% { opacity: 1; width: var(--w); }
                    85% { opacity: 1; }
                    100% { transform: translate(-1800px, 1800px) rotate(-45deg); opacity: 0; width: 0; }
                }
            `;
            document.head.appendChild(style);

            function spawnSingleStar() {
                const star = document.createElement('div');
                star.classList.add('sao-bang');
                const startX = 40 + Math.random() * 80; 
                const startY = -20 - Math.random() * 20; 
                star.style.left = `${startX}%`;
                star.style.top = `${startY}%`;
                const duration = 1.5 + Math.random() * 1.5; 
                star.style.animationDuration = `${duration}s`;
                const length = 300 + Math.random() * 200; 
                star.style.setProperty('--w', `${length}px`);
                const thickness = 2 + Math.random() * 1.5; 
                star.style.height = `${thickness}px`;
                const blueNeon = '#00f0ff';
                star.style.background = `linear-gradient(-45deg, ${blueNeon}, rgba(0, 0, 0, 0))`;
                star.style.filter = `drop-shadow(0 0 10px ${blueNeon}) drop-shadow(0 0 20px #0077ff)`;

                star.addEventListener('animationend', () => { star.remove(); });
                starContainer.appendChild(star);
            }

            function triggerWave() {
                const soLuongSao = 20;
                const chuKyGiay = 180; 
                for (let i = 0; i < soLuongSao; i++) {
                    const randomDelayMs = Math.random() * (chuKyGiay - 5) * 1000;
                    setTimeout(spawnSingleStar, randomDelayMs);
                }
            }
            triggerWave();
            setInterval(triggerWave, 180000);
        }
        initShootingStars();

        // HIỆU ỨNG ÂM THANH SYNTH
        let audioCtx = null;
        function playSynthSound(frequency, type = 'sine', duration = 0.15) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (error) {
                console.log("Trình duyệt chặn âm thanh: ", error);
            }
        }

        // NỀN DI CHUYỂN THEO CHUỘT
        document.addEventListener('mousemove', (e) => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mouseX = e.clientX - (width / 2);
            const mouseY = e.clientY - (height / 2);
            const moveX = (mouseX / width) * 30;
            const moveY = (mouseY / height) * 30;
            document.body.style.backgroundPosition = `calc(50% + ${moveX}px) calc(50% + ${moveY}px)`;
        });

        // ĐỊNH NGHĨA CÁC BIẾN UI
        const popup = document.getElementById('imagePopup');
        const openBtn = document.getElementById('openPopupBtn');
        const closeBtn = document.getElementById('closePopupBtn');
        const gameSection = document.getElementById('gameSection');

        openBtn.addEventListener('click', () => {
            playSynthSound(250, 'triangle', 0.12);
            gameSection.style.display = 'block';
            if (typeof leaveChessRoom === 'function') leaveChessRoom();
            popup.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            playSynthSound(180, 'sine', 0.1);
            popup.style.display = 'none';
        });

        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                playSynthSound(180, 'sine', 0.1);
                popup.style.display = 'none';
            }
        });
    </script>
    <!-- LIÊN KẾT FILE LOGIC GAME CỜ VUA RIÊNG BIỆT -->
    <script src="chess.js"></script>
</body>
</html>
