<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            margin: 0 auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .btn {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chào mừng bạn đến với trang web của tôi!</h1>
        <p>Đây là một trang HTML cơ bản được tạo tự động. Bạn có thể chỉnh sửa nội dung này bất cứ lúc nào.</p>
        
        <h3>Các tính năng chính:</h3>
        <ul>
            <li>Cấu trúc chuẩn HTML5</li>
            <li>Giao diện thân thiện với thiết bị di động (Responsive)</li>
            <li>Có sẵn CSS cơ bản để làm đẹp</li>
        </ul>

        <a href="#" class="btn">Bấm vào đây</a>
    </div>

    <script>
        // Bạn có thể viết code JavaScript ở đây nếu cần
        console.log("Trang web đã tải thành công!");
    </script>
</body>
</html>
