<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Căn giữa toàn bộ nội dung theo chiều dọc màn hình */
            box-sizing: border-box;
        }

        /* Hiệu ứng khung kính Glassmorphism siêu đẹp */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12); /* Trở nên trong suốt hơn */
            backdrop-filter: blur(10px); /* Làm mờ nền vũ trụ phía sau tạo hiệu ứng mờ kính */
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            margin: 0 auto;
            border-radius: 16px; /* Bo góc mềm mại hơn */
            border: 1px solid rgba(255, 255, 255, 0.2.5); /* Viền kính sáng nhẹ */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        /* Hiệu ứng chữ Chao Mung đổi màu Galaxy liên tục */
        h1 {
            background: linear-gradient(45deg, #ff5722, #ff007f, #7000ff, #00c6ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: galaxyAnimation 6s ease infinite;
            font-size: 65px;
            margin-top: 0;
            font-weight: 800;
        }

        @keyframes galaxyAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Chữ phụ màu trắng phát sáng nhẹ trên nền tối */
        p {
            color: #ffffff;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        /* Nút bấm Neon huyền ảo */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff5722, #ff007f);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px; /* Nút bo tròn hiện đại */
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px); /* Nút bay nhẹ lên khi di chuột vào */
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8); /* Phát sáng mạnh hơn */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chao Mung Đa Đen!!!</h1>
        <p>Trang Vip Pro Boong đã tạo.</p>
        <a href="#" class="btn">Bấm vào đây</a>
    </div>

    <script>
        console.log("Trang web vũ trụ siêu cấp VIP PRO đã tải thành công!");
    </script>
</body>
</html>
