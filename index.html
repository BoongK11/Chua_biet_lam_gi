<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <style>
body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            /* Thêm ảnh nền vũ trụ chất lượng cao */
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: cover; /* Giúp ảnh phủ kín toàn bộ màn hình */
            background-position: center; /* Căn giữa ảnh nền */
            background-attachment: fixed; /* Giữ cố định nền khi cuộn trang */
        }
.container {
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9); /* Đổi từ white sang màu trắng trong suốt 90% */
            padding: 20px;
            margin: 0 auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
h1 {
            color: #ff5722; /* Đổi màu cam tại đây nếu muốn */
            text-align: center; /* Căn giữa dòng chữ */
            font-size: 65px; /* Thêm dòng này để chữ siêu to khổng lồ */
        }
        .btn {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Chao Mung Đa Đen!!!</h1>
        
        <p style="text-align: center; font-size: 30px;">Trang Vip Pro Boong đã tạo.</p>
        
        <a href="#" class="btn">Bấm vào đây</a>
    </div>

    <script>
        // Bạn có thể viết code JavaScript ở đây nếu cần
        console.log("Trang web đã tải thành công!");
    </script>
</body>
