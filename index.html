<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Hiệu ứng khung kính Glassmorphism */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            margin: 0 auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        /* Hiệu ứng chữ Chao Mung đổi màu Galaxy liên tục */
        h1 {
            background: linear-gradient(45deg, #ff5722, #ff007f, #7000ff, #00c6ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: galaxyAnimation 6s ease infinite;
            font-size: 65px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
        }

        @keyframes galaxyAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dòng chữ lớp 9A phát sáng Neon xanh rực rỡ */
        .lop-hoc {
            color: #00ffcc;
            font-size: 38px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 25px 0;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0011ff;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Chữ phụ màu trắng phát sáng nhẹ */
        p {
            color: #ffffff;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        /* Nút bấm Neon huyền ảo */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff5722, #ff007f);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chao Mung Da Den!!!</h1>
        
        <div class="lop-hoc">9A THCS Xuân Thu</div>
        
        <p>Trang Vip Pro Boong đã tạo.</p>
        
        <!-- THAY ĐỔI Ở ĐÂY: Thêm link trang web vào href và mở tab mới bằng target="_blank" -->
        <a href="https://www.google.com" target="_blank" class="btn">Bấm vào đây</a>
    </div>

    <script>
        console.log("Trang web vũ trụ siêu cấp VIP PRO đã tải thành công!");
    </script>
</body>
</html>
