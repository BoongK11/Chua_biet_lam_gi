<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <!-- Tạo logo icon hình tròn chữ 9A phát sáng cho tab trình duyệt -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23000%22 stroke=%22%2300ffcc%22 stroke-width=%225%22/><text y=%2250%22 x=%2250%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Segoe UI, Arial, sans-serif%22 font-weight=%22bold%22 font-size=%2250%22 fill=%22%2300ffcc%22 style=%22text-shadow: 0 0 10px %2300ffcc;%22>9A</text></svg>">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070');
            background-size: 110% 110%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-position 0.1s ease-out;
        }

        /* Hiệu ứng khung kính Glassmorphism */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            margin: 0 auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        /* Hiệu ứng chữ Chao Mung đổi màu Galaxy liên tục */
        h1 {
            background: linear-gradient(45deg, #ff5722, #ff007f, #7000ff, #00c6ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: galaxyAnimation 6s ease infinite;
            font-size: 65px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
        }

        @keyframes galaxyAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dòng chữ lớp học phát sáng Neon xanh rực rỡ */
        .lop-hoc {
            color: #00ffcc;
            font-size: 38px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 25px 0;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0011ff;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Chữ phụ màu trắng phát sáng nhẹ */
        p {
            color: #ffffff;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        /* Nút bấm Neon huyền ảo */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff5722, #ff007f);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8);
        }

        /* CSS CHO KHUNG POPUP HIỆN LÊN */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .popup-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            overflow-y: auto;
        }

        /* ĐÃ THÊM: CSS CHO MENU LỰA CHỌN (MUSIC & MINI GAME) */
        .menu-container {
            display: flex;
            gap: 20px;
            padding: 60px 40px 40px 40px;
            justify-content: center;
            max-width: 480px;
            margin: 0 auto;
        }

        .menu-box {
            flex: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            user-select: none;
        }

        .menu-box:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6);
        }

        .menu-icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .menu-text {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* ĐÃ THÊM: CSS NÚT QUAY LẠI GÓC TRÊN KHUNG CHỨA */
        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            position: absolute;
            top: 15px;
            left: 20px;
            transition: all 0.2s;
            z-index: 11;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* CSS CHO KHUNG LƯỚI CHỨA CÁC Ô SỐ */
        .number-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 60px 30px 25px 30px;
            max-width: 450px;
            margin: 0 auto;
        }

        /* CSS CHO TỪNG Ô SỐ NEON */
        .number-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #00ffcc, #0011ff);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        .number-box:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 0 20px #00ffcc, 0 0 30px #0011ff;
            background: linear-gradient(45deg, #ff007f, #ff5722);
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 15px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .close-btn:hover {
            color: #ff007f;
        }

        @keyframes fadeInMusic {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .menu-container {
                flex-direction: column;
                gap: 15px;
                padding: 60px 30px 30px 30px;
            }
            .menu-box {
                padding: 20px;
            }
            .number-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 60px 20px 20px 20px;
            }
            .number-box {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chao Mung Da Den!!!</h1>
        <div class="lop-hoc">AE Tồ Tề 9AB10 - K55 THCS Xuân Thu</div>
        <p>Đại Hội Võ Tuất</p>
        <a class="btn" id="openPopupBtn">Bấm vào đây</a>
    </div>

    <!-- KHUNG POPUP TỔNG -->
    <div class="popup-overlay" id="imagePopup">
        <div class="popup-content">
            <span class="close-btn" id="closePopupBtn">&times;</span>
            
            <!-- ĐÃ THÊM: MENU LỰA CHỌN BAN ĐẦU -->
            <div id="menuContainer" class="menu-container">
                <div class="menu-box" id="chooseMusicBtn">
                    <div class="menu-icon">🎵</div>
                    <div class="menu-text">Music</div>
                </div>
                <div class="menu-box" id="chooseGameBtn">
                    <div class="menu-icon">🎮</div>
                    <div class="menu-text">Mini Game</div>
                </div>
            </div>

            <!-- ĐÃ THÊM: PHẦN HIỂN THỊ MUSIC (ẨN BAN ĐẦU) -->
            <div id="musicSection" style="display: none; animation: fadeInMusic 0.3s ease-out;">
                <button class="back-btn" id="backFromMusic">⬅ Quay lại</button>
                
                <div class="number-container">
                    <div class="number-box">1</div>
                    <div class="number-box">2</div>
                    <div class="number-box">3</div>
                    <div class="number-box">4</div>
                    <div class="number-box">5</div>
                    <div class="number-box">6</div>
                    <div class="number-box">7</div>
                    <div class="number-box">8</div>
                    <div class="number-box">9</div>
                    <div class="number-box">10</div>
                </div>

                <!-- Khung chứa nhạc Spotify cho ô số 1 (Phát từ mốc 3:01) -->
                <div id="spotifyContainer1" style="display: none; padding: 0 30px 30px 30px; max-width: 450px; margin: 0 auto;">
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/331pu1rdL2Yn7Z3F1RNXBR?utm_source=generator&si=6a1bdae1c36546a6&time=181" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

                <!-- Khung chứa nhạc Spotify cho ô số 2 -->
                <div id="spotifyContainer2" style="display: none; padding: 0 30px 30px 30px; max-width: 450px; margin: 0 auto;">
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/07SQzveMFNsEBl8eKLbVIG?utm_source=generator&si=39d7229af6bb4821" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>

            <!-- ĐÃ THÊM: PHẦN HIỂN THỊ MINI GAME TRỐNG (ẨN BAN ĐẦU) -->
            <div id="gameSection" style="display: none; padding: 70px 30px 40px 30px; text-align: center; max-width: 450px; margin: 0 auto; animation: fadeInMusic 0.3s ease-out;">
                <button class="back-btn" id="backFromGame">⬅ Quay lại</button>
                <h3 style="color: #ff007f; font-size: 28px; margin: 10px 0; text-shadow: 0 0 10px #ff007f;">Mini Game</h3>
                <p style="color: #fff; font-size: 18px; text-shadow: none; margin-top: 15px;">Tính năng đang được phát triển, quay lại sau nhé! 😉</p>
            </div>

        </div>
    </div>

    <script>
        // HÀM TỰ TẠO ÂM THANH SỬ DỤNG WEB AUDIO API
        let audioCtx = null;
        function playSynthSound(frequency, type = 'sine', duration = 0.15) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); 
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (error) {
                console.log("Trình duyệt chặn âm thanh: ", error);
            }
        }

        // XỬ LÝ NỀN DI CHUYỂN THEO CHUỘT
        document.addEventListener('mousemove', (e) => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mouseX = e.clientX - (width / 2);
            const mouseY = e.clientY - (height / 2);
            const moveX = (mouseX / width) * 30;
            const moveY = (mouseY / height) * 30;
            document.body.style.backgroundPosition = `calc(50% + ${moveX}px) calc(50% + ${moveY}px)`;
        });

        // ĐỊNH NGHĨA CÁC PHẦN TỬ DOM GIAO DIỆN
        const popup = document.getElementById('imagePopup');
        const openBtn = document.getElementById('openPopupBtn');
        const closeBtn = document.getElementById('closePopupBtn');
        
        const menuContainer = document.getElementById('menuContainer');
        const musicSection = document.getElementById('musicSection');
        const gameSection = document.getElementById('gameSection');
        
        const chooseMusicBtn = document.getElementById('chooseMusicBtn');
        const chooseGameBtn = document.getElementById('chooseGameBtn');
        const backFromMusic = document.getElementById('backFromMusic');
        const backFromGame = document.getElementById('backFromGame');

        const spotifyCtrl1 = document.getElementById('spotifyContainer1');
        const spotifyCtrl2 = document.getElementById('spotifyContainer2');

        // Hàm ẩn tất cả nhạc Spotify
        function hideAllMusic() {
            spotifyCtrl1.style.display = 'none';
            spotifyCtrl2.style.display = 'none';
        }

        // Hàm đặt Popup về trạng thái Menu lựa chọn ban đầu
        function resetPopupToMenu() {
            menuContainer.style.display = 'flex';
            musicSection.style.display = 'none';
            gameSection.style.display = 'none';
            hideAllMusic();
        }

        // Bấm nút chính mở Popup
        openBtn.addEventListener('click', () => {
            playSynthSound(250, 'triangle', 0.12); 
            resetPopupToMenu();
            popup.style.display = 'flex';
        });

        // Bấm nút đóng X
        closeBtn.addEventListener('click', () => {
            playSynthSound(180, 'sine', 0.1); 
            popup.style.display = 'none';
        });

        // Bấm vùng ngoài để đóng Popup
        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                playSynthSound(180, 'sine', 0.1);
                popup.style.display = 'none';
            }
        });

        // XỬ LÝ CHUYỂN PHẦN TRONG MENU
        chooseMusicBtn.addEventListener('click', () => {
            playSynthSound(350, 'triangle', 0.1);
            menuContainer.style.display = 'none';
            musicSection.style.display = 'block';
        });

        chooseGameBtn.addEventListener('click', () => {
            playSynthSound(350, 'triangle', 0.1);
            menuContainer.style.display = 'none';
            gameSection.style.display = 'block';
        });

        // XỬ LÝ CÁC NÚT QUAY LẠI MENU CHÍNH
        backFromMusic.addEventListener('click', () => {
            playSynthSound(200, 'sine', 0.1);
            resetPopupToMenu();
        });

        backFromGame.addEventListener('click', () => {
            playSynthSound(200, 'sine', 0.1);
            resetPopupToMenu();
        });

        // XỬ LÝ SỰ KIỆN CLICK CHO TỪNG Ô SỐ TRONG PHẦN MUSIC
        const numberBoxes = document.querySelectorAll('.number-box');
        numberBoxes.forEach(box => {
            box.addEventListener('click', () => {
                const selectedNumber = box.innerText.trim();
                
                if (selectedNumber === "1") {
                    playSynthSound(520, 'triangle', 0.15);
                    spotifyCtrl2.style.display = 'none'; 
                    
                    if (spotifyCtrl1.style.display === 'none' || spotifyCtrl1.style.display === '') {
                        spotifyCtrl1.style.display = 'block';
                    } else {
                        spotifyCtrl1.style.display = 'none';
                    }
                } 
                else if (selectedNumber === "2") {
                    playSynthSound(520, 'triangle', 0.15);
                    spotifyCtrl1.style.display = 'none'; 
                    
                    if (spotifyCtrl2.style.display === 'none' || spotifyCtrl2.style.display === '') {
                        spotifyCtrl2.style.display = 'block';
                    } else {
                        spotifyCtrl2.style.display = 'none';
                    }
                } 
                else {
                    playSynthSound(400, 'triangle', 0.12);
                }
                console.log("Bạn đã bấm ô số: " + selectedNumber);
            });
        });

        console.log("Hệ thống Menu phân loại (Music & Mini Game) đã tích hợp thành công!");
    </script>
</body>
</html>
